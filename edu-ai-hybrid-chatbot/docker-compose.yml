services:
  backend:
    build: ./backend
    env_file: .env.dev
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  mcp:
    image: python:3.11-slim
    container_name: mcp
    volumes:
      - ./mcp:/app
    working_dir: /app
    command: [ "bash", "-c", "pip install fastapi uvicorn && uvicorn mcp_server:app --host 0.0.0.0 --port 9000" ]
    ports:
      - "9000:9000"
